<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AtomCord — Регистрация</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body { margin: 0; padding: 0; }
    .login-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .login-card {
      background: #1a1a2a;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      width: 360px;
    }
    .login-logo { font-size: 48px; margin-bottom: 16px; animation: spin 3s linear infinite; display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .login-card h1 { font-size: 28px; margin-bottom: 8px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .login-subtitle { color: #888; margin-bottom: 24px; font-size: 14px; }
    .login-input { width: 100%; padding: 14px; margin-bottom: 16px; background: #2a2a3a; border: 2px solid transparent; border-radius: 12px; color: white; font-size: 16px; outline: none; }
    .login-input:focus { border-color: #5865f2; }
    .login-button { width: 100%; padding: 14px; background: #5865f2; border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .login-button.secondary { background: transparent; border: 1px solid #5865f2; margin-top: 12px; }
    .error-msg { color: #ed4245; margin-top: 12px; font-size: 12px; display: none; }
  </style>
</head>
<body>
  <div class="login-screen">
    <div class="login-card">
      <div class="login-logo">⚛️</div>
      <h1>Регистрация</h1>
      <p class="login-subtitle">Создай аккаунт</p>
      <input type="text" id="reg-nickname" class="login-input" placeholder="Никнейм (мин 2 символа)" autocomplete="off">
      <input type="password" id="reg-password" class="login-input" placeholder="Пароль (мин 4 символа)" autocomplete="off">
      <input type="password" id="reg-confirm" class="login-input" placeholder="Подтвердите пароль" autocomplete="off">
      <button id="register-btn" class="login-button">Зарегистрироваться</button>
      <button id="back-to-login-btn" class="login-button secondary">← Назад к входу</button>
      <div id="error" class="error-msg"></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script>
    // Элементы
    var nicknameInput = document.getElementById('reg-nickname');
    var passwordInput = document.getElementById('reg-password');
    var confirmInput = document.getElementById('reg-confirm');
    var registerBtn = document.getElementById('register-btn');
    var backBtn = document.getElementById('back-to-login-btn');
    var errorDiv = document.getElementById('error');

    // Функция показа ошибки
    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
      setTimeout(function() {
        errorDiv.style.display = 'none';
      }, 3000);
    }

    // Функция регистрации
    window.handleRegister = function() {
      var nickname = nicknameInput.value.trim();
      var password = passwordInput.value;
      var confirm = confirmInput.value;

      console.log('Регистрация:', { nickname: nickname, password: password, confirm: confirm });

      // Проверки
      if (nickname.length < 2) {
        showError('Никнейм должен быть минимум 2 символа');
        nicknameInput.focus();
        return;
      }
      if (password.length < 4) {
        showError('Пароль должен быть минимум 4 символа');
        passwordInput.focus();
        return;
      }
      if (password !== confirm) {
        showError('Пароли не совпадают');
        confirmInput.focus();
        return;
      }

      // Блокируем кнопку
      registerBtn.disabled = true;
      registerBtn.textContent = '⏳ Регистрация...';

      // Подключаемся к серверу
      var socket = io('https://atomcord-backend.onrender.com', { transports: ['websocket', 'polling'] });

      socket.on('connect', function() {
        console.log('Сокет подключен, отправляем регистрацию');
        socket.emit('register', { nickname: nickname, password: password }, function(response) {
          console.log('Ответ сервера:', response);
          if (response && response.success) {
            localStorage.setItem('atomcord_user', JSON.stringify({ nickname: nickname, password: password }));
            window.location.href = '/chat.html';
          } else {
            showError(response?.error || 'Ошибка регистрации');
            registerBtn.disabled = false;
            registerBtn.textContent = 'Зарегистрироваться';
            nicknameInput.focus();
          }
        });
      });

      socket.on('connect_error', function(err) {
        console.error('Ошибка подключения:', err);
        showError('Сервер не отвечает');
        registerBtn.disabled = false;
        registerBtn.textContent = 'Зарегистрироваться';
        nicknameInput.focus();
      });
    };

    // Вешаем события
    registerBtn.onclick = window.handleRegister;
    backBtn.onclick = function() { window.location.href = '/login.html'; };
    
    // Enter на полях
    nicknameInput.onkeypress = function(e) { if (e.key === 'Enter') window.handleRegister(); };
    passwordInput.onkeypress = function(e) { if (e.key === 'Enter') window.handleRegister(); };
    confirmInput.onkeypress = function(e) { if (e.key === 'Enter') window.handleRegister(); };
    
    // Фокус
    nicknameInput.focus();

    // Хард-фикс клавиатуры
    (function hardFix() {
      console.log('⚡ Хард-фикс для register.html');
      function fix() {
        document.querySelectorAll('input, textarea').forEach(function(el) {
          if (el.hasAttribute('data-fixed')) return;
          var newEl = el.cloneNode(true);
          el.parentNode.replaceChild(newEl, el);
          newEl.setAttribute('data-fixed', 'true');
        });
      }
      fix();
      setInterval(fix, 2000);
      new MutationObserver(fix).observe(document.body, { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
