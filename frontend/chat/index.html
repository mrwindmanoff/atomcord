<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AtomCord — Чат</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Все стили как в предыдущей версии, плюс: */
    .member-role {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #2a2a3a;
      margin-left: 8px;
    }
    .member-role.owner { background: #faa81a; color: #1a1a2a; }
    .member-role.admin { background: #5865f2; }
    .member-role.moderator { background: #3ba55d; }
    .role-select {
      background: #2a2a3a;
      border: none;
      color: white;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
    }
    .role-select:hover { background: #5865f2; }
  </style>
</head>
<body>
  <div id="app" class="main-layout"></div>

  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script>
    let currentUser = null;
    let socket = null;
    let currentServer = null;
    let currentChannel = null;
    let servers = [];
    let messagesCache = {};
    let voiceStream = null;
    let peerConnections = new Map();
    let isInVoice = false;
    let userStatuses = new Map();
    let activityInterval = null;
    
    function updateMyActivity() {
      if (socket && currentUser) {
        socket.emit('update-activity', { userId: currentUser.userId });
      }
    }
    
    function startActivityTracking() {
      if (activityInterval) clearInterval(activityInterval);
      activityInterval = setInterval(updateMyActivity, 30000);
      ['click', 'keypress', 'mousemove', 'scroll'].forEach(event => {
        document.addEventListener(event, updateMyActivity);
      });
    }
    
    function getStatusFromLastActivity(lastActivity) {
      const now = Date.now();
      const diff = now - lastActivity;
      if (diff < 60000) return 'online';
      if (diff < 600000) return 'away';
      return 'offline';
    }
    
    function hasPermission(permission) {
      if (!currentServer) return false;
      if (currentServer.myRole === 'owner') return true;
      return currentServer.myPermissions && currentServer.myPermissions.includes(permission);
    }
    
    function renderMembers() {
      const container = document.getElementById('members-container');
      if (!container || !currentServer) return;
      
      const membersList = currentServer.members || [];
      if (membersList.length === 0) {
        container.innerHTML = '<div class="members-header">УЧАСТНИКИ — 0</div><div class="member">Нет участников</div>';
        return;
      }
      
      container.innerHTML = `
        <div class="members-header">УЧАСТНИКИ — ${membersList.length}</div>
        ${membersList.map(member => {
          const status = userStatuses.get(member.userId) || { status: 'offline' };
          const statusText = { online: 'В сети', away: 'Отошёл', offline: 'Не в сети' }[status.status];
          const roleText = { owner: 'Владелец', admin: 'Админ', moderator: 'Модератор', member: 'Участник' }[member.role] || 'Участник';
          const roleClass = { owner: 'owner', admin: 'admin', moderator: 'moderator', member: '' }[member.role] || '';
          
          // Показываем выбор роли только владельцу
          const roleSelector = (currentServer.myRole === 'owner' && member.userId !== currentUser.userId) ? `
            <select class="role-select" data-user-id="${member.userId}">
              <option value="member" ${member.role === 'member' ? 'selected' : ''}>Участник</option>
              <option value="moderator" ${member.role === 'moderator' ? 'selected' : ''}>Модератор</option>
              <option value="admin" ${member.role === 'admin' ? 'selected' : ''}>Админ</option>
            </select>
          ` : `<span class="member-role ${roleClass}">${roleText}</span>`;
          
          return `
            <div class="member" data-user-id="${member.userId}">
              <div class="member-status ${status.status}"></div>
              <div class="member-name">${escapeHtml(member.nickname)}</div>
              ${roleSelector}
              <div style="font-size: 10px; color: #888;">${statusText}</div>
            </div>
          `;
        }).join('')}
      `;
      
      // Обработчики смены роли
      document.querySelectorAll('.role-select').forEach(select => {
        select.onchange = (e) => {
          const targetUserId = select.dataset.userId;
          const newRole = select.value;
          socket.emit('assign-role', { serverId: currentServer.id, targetUserId, role: newRole }, (res) => {
            if (!res.success) showNotification('Ошибка', res.error);
          });
        };
      });
    }
    
    function showNotification(title, body) {
      const div = document.createElement('div');
      div.className = 'notification';
      div.innerHTML = `<strong>${title}</strong><br>${body}`;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 4000);
      if (Notification.permission === 'granted') new Notification(title, { body: body });
    }
    if (Notification.permission === 'default') Notification.requestPermission();

    function showModal(title, content, onConfirm, onCancel) {
      const modal = document.createElement('div');
      modal.className = 'modal';
      modal.innerHTML = `<div class="modal-content">${content}</div>`;
      document.body.appendChild(modal);
      const confirmBtn = modal.querySelector('#modal-confirm');
      const cancelBtn = modal.querySelector('#modal-cancel');
      if (confirmBtn) confirmBtn.onclick = () => { if (onConfirm) onConfirm(); modal.remove(); };
      if (cancelBtn) cancelBtn.onclick = () => { if (onCancel) onCancel(); modal.remove(); };
      const input = modal.querySelector('input');
      if (input) input.focus();
      return modal;
    }

    function renderUI() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="sidebar">
          <div class="sidebar-header">
            <div class="logo"><span class="logo-atom">⚛️</span><span class="logo-text">AtomCord</span></div>
          </div>
          <div class="sidebar-buttons">
            <button id="create-server-btn" class="sidebar-btn">➕ Создать сервер</button>
            <button id="join-by-invite-btn" class="sidebar-btn">🔗 Вступить по ссылке</button>
          </div>
          <div class="servers-section" id="servers-list">
            ${servers.map(s => `
              <div class="server ${currentServer?.id === s.id ? 'active' : ''}" data-server-id="${s.id}">
                <div class="server-icon">${s.name.charAt(0).toUpperCase()}</div>
                <div class="server-name">${escapeHtml(s.name)}</div>
                ${(s.myRole === 'owner' || (s.myPermissions && s.myPermissions.includes('admin'))) ? 
                  `<button class="server-settings" data-server-id="${s.id}" title="Настройки сервера">⚙️</button>` : ''}
              </div>
            `).join('')}
          </div>
          <div class="members-section" id="members-container">
            <div class="members-header">УЧАСТНИКИ</div>
          </div>
          <div class="user-info">
            <span>👤 ${escapeHtml(currentUser?.nickname || '')}</span>
            <button id="logout-btn" class="logout-btn">🚪</button>
          </div>
        </div>
        <div class="main-content">
          <div class="chat-header"><h2>${currentChannel ? (currentChannel.type === 'voice' ? '🎙️' : '#') + ' ' + escapeHtml(currentChannel.name) : 'Выберите канал'}</h2></div>
          <div class="messages-container" id="messages-container"><div class="empty-messages">Загрузка...</div></div>
          <div id="input-area"></div>
          <div id="voice-panel"></div>
        </div>
      `;
      
      // Кнопка создания сервера
      document.getElementById('create-server-btn')?.addEventListener('click', () => {
        showModal('Создать сервер', '<h3>Создать сервер</h3><input type="text" id="modal-input" placeholder="Название сервера"><div><button class="modal-confirm" id="modal-confirm">Создать</button><button class="modal-cancel" id="modal-cancel">Отмена</button></div>', () => {
          const name = document.querySelector('#modal-input')?.value.trim();
          if (name) socket.emit('create-server', { name });
        });
      });
      
      // Кнопка вступления по ссылке
      document.getElementById('join-by-invite-btn')?.addEventListener('click', () => {
        showModal('Вступить по ссылке', '<h3>Вступить по ссылке</h3><input type="text" id="modal-input" placeholder="Вставьте ссылку-приглашение"><div><button class="modal-confirm" id="modal-confirm">Вступить</button><button class="modal-cancel" id="modal-cancel">Отмена</button></div>', () => {
          const inviteUrl = document.querySelector('#modal-input')?.value.trim();
          if (inviteUrl) {
            const code = inviteUrl.split('/invite/')[1] || inviteUrl;
            socket.emit('join-server-by-invite', { code }, (res) => {
              if (res?.success) {
                showNotification('Успех', 'Вы вступили в сервер!');
                socket.emit('get-servers');
              } else {
                showNotification('Ошибка', res?.error || 'Неверная ссылка');
              }
            });
          }
        });
      });
      
      // Настройки сервера (шестерёнка)
      document.querySelectorAll('.server-settings').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const serverId = btn.dataset.serverId;
          const server = servers.find(s => s.id === serverId);
          if (server && (server.myRole === 'owner' || (server.myPermissions && server.myPermissions.includes('admin')))) {
            socket.emit('create-invite', { serverId, maxUses: 0, expiresInHours: 168 }, (res) => {
              if (res?.success) {
                let permissionsHtml = '';
                if (server.myRole === 'owner') {
                  permissionsHtml = `
                    <div style="margin-top: 16px; text-align: left;">
                      <h4>Управление ролями</h4>
                      <p style="font-size: 12px; color: #888;">Кликните на роль участника в списке справа, чтобы изменить</p>
                    </div>
                  `;
                }
                showModal('Настройки сервера', `
                  <h3>${escapeHtml(server.name)}</h3>
                  <div class="invite-link">${res.inviteUrl}</div>
                  <button id="copy-invite-btn" class="copy-btn">📋 Копировать ссылку</button>
                  ${permissionsHtml}
                  <div><button class="modal-cancel" id="modal-cancel">Закрыть</button></div>
                `, null, () => {});
                const copyBtn = document.querySelector('#copy-invite-btn');
                if (copyBtn) {
                  copyBtn.onclick = () => {
                    navigator.clipboard.writeText(res.inviteUrl);
                    showNotification('Скопировано', 'Ссылка-приглашение скопирована');
                  };
                }
              } else {
                showNotification('Ошибка', res?.error || 'Не удалось создать ссылку');
              }
            });
          } else {
            showNotification('Нет прав', 'У вас нет прав на управление сервером');
          }
        };
      });
      
      // Выбор сервера
      document.querySelectorAll('.server').forEach(el => {
        const serverId = el.dataset.serverId;
        if (serverId) {
          el.onclick = () => selectServer(serverId);
        }
      });
      
      const inputArea = document.getElementById('input-area');
      const voicePanel = document.getElementById('voice-panel');
      
      if (currentChannel?.type === 'text') {
        inputArea.innerHTML = `<div class="message-input-area"><input type="text" id="message-input" class="message-input" placeholder="Введите сообщение..."><button id="send-btn" class="send-btn">📤</button></div>`;
        voicePanel.innerHTML = '';
        const msgInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        if (msgInput) {
          msgInput.onkeypress = (e) => { if (e.key === 'Enter') { e.preventDefault(); const text = msgInput.value.trim(); if (text && socket) { socket.emit('send-message', { channelId: currentChannel.id, text }); msgInput.value = ''; } } };
          msgInput.focus();
        }
        if (sendBtn) sendBtn.onclick = () => { const text = msgInput?.value.trim(); if (text && socket) { socket.emit('send-message', { channelId: currentChannel.id, text }); if (msgInput) msgInput.value = ''; } };
      } else if (currentChannel?.type === 'voice') {
        inputArea.innerHTML = '';
        voicePanel.innerHTML = `<div class="voice-panel"><div class="voice-users" id="voice-users">👥 0 в голосе</div><button id="voice-connect-btn" class="voice-btn">🎤 Подключиться</button></div>`;
        const connectBtn = document.getElementById('voice-connect-btn');
        if (connectBtn) {
          connectBtn.onclick = async () => {
            if (isInVoice) {
              if (voiceStream) voiceStream.getTracks().forEach(t => t.stop());
              peerConnections.forEach(pc => pc.close());
              peerConnections.clear();
              socket.emit('leave-voice', { channelId: currentChannel.id });
              isInVoice = false;
              connectBtn.textContent = '🎤 Подключиться';
              connectBtn.classList.remove('leave');
            } else {
              try {
                voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                socket.emit('join-voice', { channelId: currentChannel.id });
                isInVoice = true;
                connectBtn.textContent = '🔴 Отключиться';
                connectBtn.classList.add('leave');
              } catch(e) { alert('Нет доступа к микрофону'); }
            }
          };
        }
      }
      
      document.querySelectorAll('.channel').forEach(el => { el.onclick = () => selectChannel(el.dataset.channelId); });
      
      // Кнопки создания каналов (только с правами)
      if (hasPermission('manage_channels') || currentServer?.myRole === 'owner') {
        document.getElementById('add-text-channel')?.addEventListener('click', () => createChannel('text'));
        document.getElementById('add-voice-channel')?.addEventListener('click', () => createChannel('voice'));
      }
      
      document.getElementById('logout-btn')?.addEventListener('click', () => { if (socket) socket.disconnect(); localStorage.removeItem('atomcord_user'); window.location.href = '/login'; });
      
      if (currentChannel?.type === 'text') renderMessages();
      renderMembers();
    }

    function createChannel(type) { 
      showModal(`Создать ${type === 'text' ? 'текстовый' : 'голосовой'} канал`, `<h3>Создать канал</h3><input type="text" id="modal-input" placeholder="Название канала"><div><button class="modal-confirm" id="modal-confirm">Создать</button><button class="modal-cancel" id="modal-cancel">Отмена</button></div>`, () => {
        const name = document.querySelector('#modal-input')?.value.trim();
        if (name && currentServer) socket.emit('create-channel', { serverId: currentServer.id, name, type });
      });
    }
    
    function selectServer(id) { 
      currentServer = servers.find(s => s.id === id); 
      if (currentServer) {
        socket.emit('join-server', { serverId: currentServer.id }, (res) => {
          if (res) {
            currentServer.myRole = res.myRole;
            currentServer.myPermissions = res.myPermissions;
          }
        });
      }
      renderUI(); 
    }
    
    function selectChannel(id) { 
      currentChannel = currentServer?.channels?.find(c => c.id === id); 
      if (currentChannel?.type === 'text') socket.emit('join-text-channel', currentChannel.id); 
      renderUI(); 
    }
    
    function renderMessages() {
      const container = document.getElementById('messages-container');
      const msgs = messagesCache[currentChannel?.id] || [];
      if (!msgs.length) container.innerHTML = '<div class="empty-messages">Нет сообщений</div>';
      else container.innerHTML = msgs.map(m => `<div class="message"><strong style="color:#b392f0;">${escapeHtml(m.nickname)}</strong><span>${escapeHtml(m.text)}</span></div>`).join('');
      container.scrollTop = container.scrollHeight;
    }
    
    function appendMessage(m) {
      const container = document.getElementById('messages-container');
      if (!container) return;
      const div = document.createElement('div');
      div.className = 'message';
      div.innerHTML = `<strong style="color:#b392f0;">${escapeHtml(m.nickname)}</strong><span>${escapeHtml(m.text)}</span>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      const empty = container.querySelector('.empty-messages');
      if (empty) empty.remove();
      if (document.hidden) showNotification('Новое сообщение', `${m.nickname}: ${m.text.substring(0, 50)}`);
    }
    
    function escapeHtml(s) { if (!s) return ''; const div = document.createElement('div'); div.textContent = s; return div.innerHTML; }

    function setupSocketEvents() {
      socket.on('servers-list', (list) => { 
        servers = list; 
        if (servers.length && !currentServer) selectServer(servers[0].id); 
        renderUI(); 
      });
      socket.on('server-created', (s) => { 
        servers.push({ ...s, myRole: 'owner', myPermissions: ['admin', 'manage_channels', 'manage_roles', 'create_invite'] }); 
        renderUI(); 
      });
      socket.on('server-channels', (ch) => { if (currentServer) { currentServer.channels = ch; if (!currentChannel && ch.length) selectChannel(ch[0].id); renderUI(); } });
      socket.on('channel-created', (ch) => { if (currentServer && ch.serverId === currentServer.id) { currentServer.channels.push(ch); renderUI(); } });
      socket.on('channel-history', ({ channelId, messages }) => { messagesCache[channelId] = messages; if (currentChannel?.id === channelId) renderMessages(); });
      socket.on('new-message', (m) => { if (!messagesCache[m.channelId]) messagesCache[m.channelId] = []; messagesCache[m.channelId].push(m); if (currentChannel?.id === m.channelId) appendMessage(m); });
      
      socket.on('server-members', ({ serverId, members }) => {
        if (currentServer && currentServer.id === serverId) {
          currentServer.members = members;
          renderMembers();
        }
      });
      
      socket.on('user-status-update', ({ userId, status, lastActivity }) => {
        userStatuses.set(userId, { status, lastActivity });
        if (currentServer && currentServer.members?.some(m => m.userId === userId)) {
          renderMembers();
        }
      });
      
      // Голосовые события
      socket.on('user-joined-voice', ({ socketId }) => { if (isInVoice && socketId !== socket.id) createPeerConnection(socketId); updateVoiceUsers(); });
      socket.on('user-left-voice', ({ socketId }) => { const pc = peerConnections.get(socketId); if (pc) { pc.close(); peerConnections.delete(socketId); } updateVoiceUsers(); });
      socket.on('voice-offer', async ({ fromId, offer }) => { if (!isInVoice) return; const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }); peerConnections.set(fromId, pc); if (voiceStream) voiceStream.getTracks().forEach(t => pc.addTrack(t, voiceStream)); pc.ontrack = (e) => { const audio = new Audio(); audio.srcObject = e.streams[0]; audio.autoplay = true; }; pc.onicecandidate = (e) => { if (e.candidate) socket.emit('voice-ice-candidate', { targetId: fromId, candidate: e.candidate }); }; await pc.setRemoteDescription(new RTCSessionDescription(offer)); const answer = await pc.createAnswer(); await pc.setLocalDescription(answer); socket.emit('voice-answer', { targetId: fromId, answer }); });
      socket.on('voice-answer', async ({ fromId, answer }) => { const pc = peerConnections.get(fromId); if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer)); });
      socket.on('voice-ice-candidate', async ({ fromId, candidate }) => { const pc = peerConnections.get(fromId); if (pc) await pc.addIceCandidate(new RTCIceCandidate(candidate)); });
      socket.on('voice-users', () => updateVoiceUsers());
    }

    async function createPeerConnection(targetId) {
      const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      peerConnections.set(targetId, pc);
      if (voiceStream) voiceStream.getTracks().forEach(t => pc.addTrack(t, voiceStream));
      pc.ontrack = (e) => { const audio = new Audio(); audio.srcObject = e.streams[0]; audio.autoplay = true; };
      pc.onicecandidate = (e) => { if (e.candidate) socket.emit('voice-ice-candidate', { targetId, candidate: e.candidate }); };
      const offer = await pc.createOffer(); await pc.setLocalDescription(offer); socket.emit('voice-offer', { targetId, offer });
    }

    function updateVoiceUsers() { const container = document.getElementById('voice-users'); if (container) socket.emit('get-voice-users', currentChannel?.id, (users) => { container.textContent = `👥 ${users?.length || 0} в голосе`; }); }

    const saved = localStorage.getItem('atomcord_user');
    if (!saved) { window.location.href = '/login'; } else {
      currentUser = JSON.parse(saved);
      socket = io('https://atomcord-backend.onrender.com', { transports: ['websocket', 'polling'] });
      socket.on('connect', () => { 
        socket.emit('login', { nickname: currentUser.nickname, password: currentUser.password }, (res) => { 
          if (!res?.success) { localStorage.removeItem('atomcord_user'); window.location.href = '/login'; } 
          else { 
            currentUser.userId = res.userId;
            socket.emit('get-servers'); 
            setupSocketEvents(); 
            renderUI(); 
            startActivityTracking();
            updateMyActivity();
          } 
        }); 
      });
      socket.on('connect_error', () => alert('Сервер не отвечает'));
    }
  </script>
</body>
</html>
