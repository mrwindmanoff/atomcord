<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AtomCord — Чат</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f0f1a; color: #e0e0e0; overflow: hidden; }
    
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    
    .main-layout { display: flex; height: 100vh; width: 100%; }
    
    .sidebar {
      width: 280px;
      background: #1a1a2a;
      border-right: 1px solid #2a2a3a;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header { padding: 20px; border-bottom: 1px solid #2a2a3a; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 20px; font-weight: bold; }
    .logo .logo-atom { display: inline-block; animation: spin 3s linear infinite; color: #5865f2; }
    .logo .logo-text { background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
    
    .servers-section { padding: 12px; border-bottom: 1px solid #2a2a3a; max-height: 200px; overflow-y: auto; }
    .server {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .server:hover { background: #2a2a3a; }
    .server.active { background: #4a4a6a; }
    .server-icon {
      width: 36px; height: 36px;
      background: #5865f2;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    .server-name { font-size: 14px; flex: 1; }
    
    .sidebar-buttons { padding: 12px; display: flex; gap: 8px; border-bottom: 1px solid #2a2a3a; }
    .sidebar-btn {
      flex: 1;
      padding: 8px;
      background: #2a2a3a;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }
    .sidebar-btn:hover { background: #5865f2; }
    
    .channels { flex: 1; padding: 16px; overflow-y: auto; }
    .channel-category { font-size: 12px; text-transform: uppercase; color: #888; margin: 16px 0 8px 0; display: flex; justify-content: space-between; }
    .channel { padding: 8px 12px; border-radius: 8px; cursor: pointer; color: #888; margin-bottom: 2px; display: flex; align-items: center; gap: 8px; }
    .channel:hover { background: #2a2a3a; color: white; }
    .channel.active { background: #4a4a6a; color: white; }
    .add-channel-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 14px; }
    
    .user-info { padding: 16px; border-top: 1px solid #2a2a3a; display: flex; justify-content: space-between; align-items: center; }
    .logout-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 18px; }
    
    .main-content { flex: 1; display: flex; flex-direction: column; background: #0f0f1a; }
    .chat-header { padding: 16px 20px; border-bottom: 1px solid #2a2a3a; background: #1a1a2a; }
    .messages-container { flex: 1; overflow-y: auto; padding: 20px; }
    .message { margin-bottom: 12px; animation: fadeIn 0.2s; }
    .message strong { color: #b392f0; margin-right: 8px; }
    .empty-messages { text-align: center; color: #888; padding: 40px; }
    
    .message-input-area { padding: 16px; border-top: 1px solid #2a2a3a; background: #1a1a2a; display: flex; gap: 12px; }
    .message-input { flex: 1; padding: 12px; background: #2a2a3a; border: none; border-radius: 8px; color: white; }
    .send-btn { padding: 12px 20px; background: #5865f2; border: none; border-radius: 8px; color: white; cursor: pointer; }
    
    .voice-panel { background: #1a1a2a; border-top: 1px solid #2a2a3a; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
    .voice-btn { padding: 8px 16px; background: #3ba55d; border: none; border-radius: 8px; color: white; cursor: pointer; }
    .voice-btn.leave { background: #ed4245; }
    .voice-users { font-size: 12px; color: #888; }
    
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: #1a1a2a;
      padding: 24px;
      border-radius: 16px;
      width: 320px;
      text-align: center;
    }
    .modal-content input {
      width: 100%;
      padding: 12px;
      margin: 16px 0;
      background: #2a2a3a;
      border: none;
      border-radius: 8px;
      color: white;
    }
    .modal-content button {
      padding: 8px 16px;
      margin: 4px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .modal-confirm { background: #5865f2; color: white; }
    .modal-cancel { background: #2a2a3a; color: white; }
    
    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1a1a2a;
      border-left: 4px solid #5865f2;
      padding: 12px 20px;
      border-radius: 8px;
      animation: slideIn 0.3s ease;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="app" class="main-layout"></div>

  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script>
    let currentUser = null;
    let socket = null;
    let currentServer = null;
    let currentChannel = null;
    let servers = [];
    let messagesCache = {};
    let voiceStream = null;
    let peerConnections = new Map();
    let isInVoice = false;

    function showNotification(title, body) {
      const div = document.createElement('div');
      div.className = 'notification';
      div.innerHTML = `<strong>${title}</strong><br>${body}`;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 4000);
      if (Notification.permission === 'granted') new Notification(title, { body: body });
    }
    if (Notification.permission === 'default') Notification.requestPermission();

    function showModal(title, placeholder, onConfirm) {
      const modal = document.createElement('div');
      modal.className = 'modal';
      modal.innerHTML = `
        <div class="modal-content">
          <h3>${title}</h3>
          <input type="text" id="modal-input" placeholder="${placeholder}" autocomplete="off">
          <div>
            <button class="modal-confirm" id="modal-confirm">Подтвердить</button>
            <button class="modal-cancel" id="modal-cancel">Отмена</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      const input = modal.querySelector('#modal-input');
      input.focus();
      modal.querySelector('#modal-confirm').onclick = () => { onConfirm(input.value.trim()); modal.remove(); };
      modal.querySelector('#modal-cancel').onclick = () => modal.remove();
      input.onkeypress = (e) => { if (e.key === 'Enter') { onConfirm(input.value.trim()); modal.remove(); } };
    }

    function renderUI() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="sidebar">
          <div class="sidebar-header">
            <div class="logo"><span class="logo-atom">⚛️</span><span class="logo-text">AtomCord</span></div>
          </div>
          <div class="sidebar-buttons">
            <button id="create-server-btn" class="sidebar-btn">➕ Создать сервер</button>
            <button id="join-by-invite-btn" class="sidebar-btn">🔗 Вступить по ссылке</button>
          </div>
          <div class="servers-section" id="servers-list">
            ${servers.map(s => `<div class="server ${currentServer?.id === s.id ? 'active' : ''}" data-server-id="${s.id}"><div class="server-icon">${s.name.charAt(0).toUpperCase()}</div><div class="server-name">${escapeHtml(s.name)}</div></div>`).join('')}
          </div>
          ${currentServer ? `
            <div class="channels">
              <div class="channel-category"><span>ТЕКСТОВЫЕ</span><button id="add-text-channel" class="add-channel-btn" data-type="text">+</button></div>
              ${currentServer.channels?.filter(c => c.type === 'text').map(ch => `<div class="channel ${currentChannel?.id === ch.id ? 'active' : ''}" data-channel-id="${ch.id}" data-channel-type="text"><span>#</span><span>${escapeHtml(ch.name)}</span></div>`).join('')}
              <div class="channel-category"><span>ГОЛОСОВЫЕ</span><button id="add-voice-channel" class="add-channel-btn" data-type="voice">+</button></div>
              ${currentServer.channels?.filter(c => c.type === 'voice').map(ch => `<div class="channel ${currentChannel?.id === ch.id ? 'active' : ''}" data-channel-id="${ch.id}" data-channel-type="voice"><span>🎙️</span><span>${escapeHtml(ch.name)}</span></div>`).join('')}
            </div>
          ` : '<div class="channels" style="text-align:center; padding:20px;">Создайте или вступите в сервер</div>'}
          <div class="user-info"><span>👤 ${escapeHtml(currentUser?.nickname || '')}</span><button id="logout-btn" class="logout-btn">🚪</button></div>
        </div>
        <div class="main-content">
          <div class="chat-header"><h2>${currentChannel ? (currentChannel.type === 'voice' ? '🎙️' : '#') + ' ' + escapeHtml(currentChannel.name) : 'Выберите канал'}</h2></div>
          <div class="messages-container" id="messages-container"><div class="empty-messages">Загрузка...</div></div>
          <div id="input-area"></div>
          <div id="voice-panel"></div>
        </div>
      `;
      
      // Обработчики кнопок
      document.getElementById('create-server-btn')?.addEventListener('click', () => {
        showModal('Создать сервер', 'Название сервера', (name) => {
          if (name) socket.emit('create-server', { name });
        });
      });
      
      document.getElementById('join-by-invite-btn')?.addEventListener('click', () => {
        showModal('Вступить по ссылке', 'Вставьте ссылку-приглашение', (inviteUrl) => {
          if (inviteUrl) {
            const code = inviteUrl.split('/invite/')[1] || inviteUrl;
            socket.emit('join-server-by-invite', { code }, (res) => {
              if (res?.success) {
                showNotification('Успех', 'Вы вступили в сервер!');
                socket.emit('get-servers');
              } else {
                showNotification('Ошибка', res?.error || 'Неверная ссылка');
              }
            });
          }
        });
      });
      
      // Создание инвайта (правая кнопка мыши на сервере)
      document.querySelectorAll('.server').forEach(el => {
        el.onclick = () => selectServer(el.dataset.serverId);
        el.oncontextmenu = (e) => {
          e.preventDefault();
          const serverId = el.dataset.serverId;
          const server = servers.find(s => s.id === serverId);
          if (server && server.ownerId === currentUser?.userId) {
            showModal('Создать приглашение', 'Лимит использований (0 - безлимит)', (maxUses) => {
              socket.emit('create-invite', { serverId, maxUses: parseInt(maxUses) || 0, expiresInHours: 168 }, (res) => {
                if (res?.success) {
                  navigator.clipboard.writeText(res.inviteUrl);
                  showNotification('Ссылка скопирована', res.inviteUrl);
                } else {
                  showNotification('Ошибка', res?.error || 'Не удалось создать ссылку');
                }
              });
            });
          } else {
            showNotification('Нет прав', 'Только владелец сервера может создавать приглашения');
          }
        };
      });
      
      const inputArea = document.getElementById('input-area');
      const voicePanel = document.getElementById('voice-panel');
      
      if (currentChannel?.type === 'text') {
        inputArea.innerHTML = `<div class="message-input-area"><input type="text" id="message-input" class="message-input" placeholder="Введите сообщение..."><button id="send-btn" class="send-btn">📤</button></div>`;
        voicePanel.innerHTML = '';
        const msgInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        if (msgInput) {
          msgInput.onkeypress = (e) => { if (e.key === 'Enter') { e.preventDefault(); const text = msgInput.value.trim(); if (text && socket) { socket.emit('send-message', { channelId: currentChannel.id, text }); msgInput.value = ''; } } };
          msgInput.focus();
        }
        if (sendBtn) sendBtn.onclick = () => { const text = msgInput?.value.trim(); if (text && socket) { socket.emit('send-message', { channelId: currentChannel.id, text }); if (msgInput) msgInput.value = ''; } };
      } else if (currentChannel?.type === 'voice') {
        inputArea.innerHTML = '';
        voicePanel.innerHTML = `<div class="voice-panel"><div class="voice-users" id="voice-users">👥 0 в голосе</div><button id="voice-connect-btn" class="voice-btn">🎤 Подключиться</button></div>`;
        const connectBtn = document.getElementById('voice-connect-btn');
        if (connectBtn) {
          connectBtn.onclick = async () => {
            if (isInVoice) {
              if (voiceStream) voiceStream.getTracks().forEach(t => t.stop());
              peerConnections.forEach(pc => pc.close());
              peerConnections.clear();
              socket.emit('leave-voice', { channelId: currentChannel.id });
              isInVoice = false;
              connectBtn.textContent = '🎤 Подключиться';
              connectBtn.classList.remove('leave');
            } else {
              try {
                voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                socket.emit('join-voice', { channelId: currentChannel.id });
                isInVoice = true;
                connectBtn.textContent = '🔴 Отключиться';
                connectBtn.classList.add('leave');
              } catch(e) { alert('Нет доступа к микрофону'); }
            }
          };
        }
      }
      
      document.querySelectorAll('.channel').forEach(el => { el.onclick = () => selectChannel(el.dataset.channelId); });
      document.getElementById('add-text-channel')?.addEventListener('click', () => createChannel('text'));
      document.getElementById('add-voice-channel')?.addEventListener('click', () => createChannel('voice'));
      document.getElementById('logout-btn')?.addEventListener('click', () => { if (socket) socket.disconnect(); localStorage.removeItem('atomcord_user'); window.location.href = '/login'; });
      
      if (currentChannel?.type === 'text') renderMessages();
    }

    function createChannel(type) { 
      showModal(`Создать ${type === 'text' ? 'текстовый' : 'голосовой'} канал`, 'Название канала', (name) => {
        if (name && currentServer) socket.emit('create-channel', { serverId: currentServer.id, name, type });
      });
    }
    
    function selectServer(id) { currentServer = servers.find(s => s.id === id); if (currentServer) socket.emit('join-server', { serverId: currentServer.id }); renderUI(); }
    function selectChannel(id) { currentChannel = currentServer?.channels?.find(c => c.id === id); if (currentChannel?.type === 'text') socket.emit('join-text-channel', currentChannel.id); renderUI(); }
    
    function renderMessages() {
      const container = document.getElementById('messages-container');
      const msgs = messagesCache[currentChannel?.id] || [];
      if (!msgs.length) container.innerHTML = '<div class="empty-messages">Нет сообщений</div>';
      else container.innerHTML = msgs.map(m => `<div class="message"><strong style="color:#b392f0;">${escapeHtml(m.nickname)}</strong><span>${escapeHtml(m.text)}</span></div>`).join('');
      container.scrollTop = container.scrollHeight;
    }
    
    function appendMessage(m) {
      const container = document.getElementById('messages-container');
      if (!container) return;
      const div = document.createElement('div');
      div.className = 'message';
      div.innerHTML = `<strong style="color:#b392f0;">${escapeHtml(m.nickname)}</strong><span>${escapeHtml(m.text)}</span>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      const empty = container.querySelector('.empty-messages');
      if (empty) empty.remove();
      if (document.hidden) showNotification('Новое сообщение', `${m.nickname}: ${m.text.substring(0, 50)}`);
    }
    
    function escapeHtml(s) { if (!s) return ''; const div = document.createElement('div'); div.textContent = s; return div.innerHTML; }

    function setupSocketEvents() {
      socket.on('servers-list', (list) => { servers = list; if (servers.length && !currentServer) selectServer(servers[0].id); renderUI(); });
      socket.on('server-created', (s) => { servers.push(s); renderUI(); });
      socket.on('server-channels', (ch) => { if (currentServer) { currentServer.channels = ch; if (!currentChannel && ch.length) selectChannel(ch[0].id); renderUI(); } });
      socket.on('channel-created', (ch) => { if (currentServer && ch.serverId === currentServer.id) { currentServer.channels.push(ch); renderUI(); } });
      socket.on('channel-history', ({ channelId, messages }) => { messagesCache[channelId] = messages; if (currentChannel?.id === channelId) renderMessages(); });
      socket.on('new-message', (m) => { if (!messagesCache[m.channelId]) messagesCache[m.channelId] = []; messagesCache[m.channelId].push(m); if (currentChannel?.id === m.channelId) appendMessage(m); });
      
      socket.on('user-joined-voice', ({ socketId }) => { if (isInVoice && socketId !== socket.id) createPeerConnection(socketId); updateVoiceUsers(); });
      socket.on('user-left-voice', ({ socketId }) => { const pc = peerConnections.get(socketId); if (pc) { pc.close(); peerConnections.delete(socketId); } updateVoiceUsers(); });
      socket.on('voice-offer', async ({ fromId, offer }) => { if (!isInVoice) return; const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }); peerConnections.set(fromId, pc); if (voiceStream) voiceStream.getTracks().forEach(t => pc.addTrack(t, voiceStream)); pc.ontrack = (e) => { const audio = new Audio(); audio.srcObject = e.streams[0]; audio.autoplay = true; }; pc.onicecandidate = (e) => { if (e.candidate) socket.emit('voice-ice-candidate', { targetId: fromId, candidate: e.candidate }); }; await pc.setRemoteDescription(new RTCSessionDescription(offer)); const answer = await pc.createAnswer(); await pc.setLocalDescription(answer); socket.emit('voice-answer', { targetId: fromId, answer }); });
      socket.on('voice-answer', async ({ fromId, answer }) => { const pc = peerConnections.get(fromId); if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer)); });
      socket.on('voice-ice-candidate', async ({ fromId, candidate }) => { const pc = peerConnections.get(fromId); if (pc) await pc.addIceCandidate(new RTCIceCandidate(candidate)); });
      socket.on('voice-users', () => updateVoiceUsers());
    }

    async function createPeerConnection(targetId) {
      const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      peerConnections.set(targetId, pc);
      if (voiceStream) voiceStream.getTracks().forEach(t => pc.addTrack(t, voiceStream));
      pc.ontrack = (e) => { const audio = new Audio(); audio.srcObject = e.streams[0]; audio.autoplay = true; };
      pc.onicecandidate = (e) => { if (e.candidate) socket.emit('voice-ice-candidate', { targetId, candidate: e.candidate }); };
      const offer = await pc.createOffer(); await pc.setLocalDescription(offer); socket.emit('voice-offer', { targetId, offer });
    }

    function updateVoiceUsers() { const container = document.getElementById('voice-users'); if (container) socket.emit('get-voice-users', currentChannel?.id, (users) => { container.textContent = `👥 ${users?.length || 0} в голосе`; }); }

    const saved = localStorage.getItem('atomcord_user');
    if (!saved) { window.location.href = '/login'; } else {
      currentUser = JSON.parse(saved);
      socket = io('https://atomcord-backend.onrender.com', { transports: ['websocket', 'polling'] });
      socket.on('connect', () => { socket.emit('login', { nickname: currentUser.nickname, password: currentUser.password }, (res) => { if (!res?.success) { localStorage.removeItem('atomcord_user'); window.location.href = '/login'; } else { socket.emit('get-servers'); setupSocketEvents(); renderUI(); } }); });
      socket.on('connect_error', () => alert('Сервер не отвечает'));
    }
  </script>
</body>
</html>
