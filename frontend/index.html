<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AtomCord — Атомный голосовой штаб</title>
  <style>
    /* Временные стили, пока не подключится основной CSS */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: white;
      overflow: hidden;
    }
    .login-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .login-card {
      background: #1a1a2a;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      width: 360px;
    }
    .login-logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .login-card h1 {
      font-size: 28px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .login-subtitle {
      color: #888;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .login-input {
      width: 100%;
      padding: 14px;
      margin-bottom: 16px;
      background: #2a2a3a;
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
    }
    .login-input:focus {
      outline: none;
      border: 2px solid #5865f2;
    }
    .login-button {
      width: 100%;
      padding: 14px;
      background: #5865f2;
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
    }
    .login-button:hover {
      background: #4752c4;
    }
    .login-button.secondary {
      background: transparent;
      border: 1px solid #5865f2;
      margin-top: 12px;
    }
    .login-button.secondary:hover {
      background: rgba(88, 101, 242, 0.1);
    }
    .error-msg {
      color: #ed4245;
      margin-top: 12px;
      font-size: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
