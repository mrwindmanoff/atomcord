<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AtomCord — Чат</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    .main-layout { display: flex; height: 100vh; width: 100%; }
    .sidebar { width: 280px; background: #1a1a2a; border-right: 1px solid #2a2a3a; display: flex; flex-direction: column; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid #2a2a3a; }
    .logo { font-size: 20px; font-weight: bold; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo-atom { display: inline-block; animation: spin 3s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .channels { flex: 1; padding: 16px; overflow-y: auto; }
    .channel-category { font-size: 12px; text-transform: uppercase; color: #888; margin: 16px 0 8px 0; }
    .channel { padding: 8px 12px; border-radius: 8px; cursor: pointer; color: #888; margin-bottom: 2px; }
    .channel:hover { background: #2a2a3a; color: white; }
    .channel.active { background: #4a4a6a; color: white; }
    .user-info { padding: 16px; border-top: 1px solid #2a2a3a; display: flex; justify-content: space-between; align-items: center; }
    .logout-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 18px; }
    .main-content { flex: 1; display: flex; flex-direction: column; background: #0f0f1a; }
    .chat-header { padding: 16px 20px; border-bottom: 1px solid #2a2a3a; background: #1a1a2a; }
    .messages-container { flex: 1; overflow-y: auto; padding: 20px; }
    .message { margin-bottom: 12px; }
    .message strong { color: #b392f0; margin-right: 8px; }
    .empty-messages { text-align: center; color: #888; padding: 40px; }
    .message-input-area { padding: 16px; border-top: 1px solid #2a2a3a; background: #1a1a2a; display: flex; gap: 12px; }
    .message-input { flex: 1; padding: 12px; background: #2a2a3a; border: none; border-radius: 8px; color: white; }
    .send-btn { padding: 12px 20px; background: #5865f2; border: none; border-radius: 8px; color: white; cursor: pointer; }
    .voice-placeholder { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 16px; color: #888; }
    .voice-icon { font-size: 64px; opacity: 0.5; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    .voice-btn { padding: 12px 24px; background: #3ba55d; border: none; border-radius: 8px; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <div id="app" class="main-layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-atom">⚛️</span>
          <span class="logo-text">AtomCord</span>
        </div>
      </div>
      <div class="channels" id="channels-list">
        <div class="channel-category">ТЕКСТОВЫЕ КАНАЛЫ</div>
        <div class="channel active" data-channel="general"># general</div>
        <div class="channel" data-channel="random"># random</div>
        <div class="channel-category">ГОЛОСОВЫЕ КАНАЛЫ</div>
        <div class="channel" data-channel="voice-lobby">🎙️ Главный штаб</div>
        <div class="channel" data-channel="voice-gaming">🎙️ Игровая комната</div>
      </div>
      <div class="user-info">
        <span id="user-nickname">👤 Загрузка...</span>
        <button id="logout-btn" class="logout-btn" title="Выйти">🚪</button>
      </div>
    </div>
    <div class="main-content">
      <div class="chat-header">
        <h2 id="channel-name"># general</h2>
      </div>
      <div class="messages-container" id="messages-container">
        <div class="empty-messages">Загрузка сообщений...</div>
      </div>
      <div class="message-input-area" id="message-input-area">
        <input type="text" id="message-input" class="message-input" placeholder="Введите сообщение..." autocomplete="off">
        <button id="send-btn" class="send-btn">📤</button>
      </div>
    </div>
  </div>

  <script src="/main.js"></script>
  <script>
    // Проверяем авторизацию
    const savedUser = localStorage.getItem('atomcord_user');
    if (!savedUser) {
      window.location.href = '/login.html';
    }
    
    const user = JSON.parse(savedUser);
    document.getElementById('user-nickname').innerHTML = `👤 ${user.nickname}`;
    
    // Инициализация чата
    let currentChannel = { id: 'general', name: 'Общий', type: 'text' };
    let messagesCache = {};
    let socket = null;
    
    function connectSocket() {
      socket = io('https://atomcord-backend.onrender.com', { transports: ['websocket', 'polling'] });
      
      socket.on('connect', () => {
        console.log('✅ Сокет подключен');
        socket.emit('login', { nickname: user.nickname, password: user.password }, (res) => {
          if (!res?.success) {
            localStorage.removeItem('atomcord_user');
            window.location.href = '/login.html';
          }
        });
        socket.emit('join-text-channel', 'general');
      });
      
      socket.on('channel-history', ({ channelId, messages }) => {
        messagesCache[channelId] = messages;
        if (currentChannel.id === channelId) {
          renderMessages();
        }
      });
      
      socket.on('new-message', (message) => {
        if (!messagesCache[message.channelId]) messagesCache[message.channelId] = [];
        messagesCache[message.channelId].push(message);
        if (currentChannel.id === message.channelId) {
          appendMessage(message);
        }
      });
    }
    
    function renderMessages() {
      const container = document.getElementById('messages-container');
      const messages = messagesCache[currentChannel.id] || [];
      if (messages.length === 0) {
        container.innerHTML = '<div class="empty-messages">Нет сообщений. Напишите первым!</div>';
      } else {
        container.innerHTML = messages.map(msg => `
          <div class="message">
            <strong style="color:#b392f0;">${escapeHtml(msg.nickname)}</strong>
            <span>${escapeHtml(msg.text)}</span>
          </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
      }
    }
    
    function appendMessage(message) {
      const container = document.getElementById('messages-container');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message';
      msgDiv.innerHTML = `<strong style="color:#b392f0;">${escapeHtml(message.nickname)}</strong> <span>${escapeHtml(message.text)}</span>`;
      container.appendChild(msgDiv);
      container.scrollTop = container.scrollHeight;
      const empty = container.querySelector('.empty-messages');
      if (empty) empty.remove();
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    
    // Переключение каналов
    document.querySelectorAll('.channel').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.channel').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        const channelId = el.dataset.channel;
        const channelName = el.innerText.trim();
        document.getElementById('channel-name').innerHTML = channelName;
        currentChannel.id = channelId;
        currentChannel.name = channelName.replace(/[#🎙️]/g, '').trim();
        if (socket) {
          socket.emit('join-text-channel', channelId);
        }
        renderMessages();
      });
    });
    
    // Отправка сообщений
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    
    function sendMessage() {
      const text = messageInput.value.trim();
      if (text && socket && currentChannel.type === 'text') {
        socket.emit('send-message', { channelId: currentChannel.id, text });
        messageInput.value = '';
        messageInput.focus();
      }
    }
    
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    });
    
    // Выход
    document.getElementById('logout-btn').addEventListener('click', () => {
      if (socket) socket.disconnect();
      localStorage.removeItem('atomcord_user');
      window.location.href = '/login.html';
    });
    
    // Голос (заглушка)
    document.querySelectorAll('.channel').forEach(el => {
      if (el.dataset.channel.includes('voice')) {
        el.addEventListener('click', () => {
          alert('Голосовой чат в разработке. Подключится позже!');
        });
      }
    });
    
    // Запуск
    connectSocket();
    messageInput.focus();
  </script>
</body>
</html>
